<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Clínica Veterinaria - Iniciar Sesión</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/login.css}">
</head>
<body>
    <div class="login-container">
        <h2>Acceso al Sistema Veterinario</h2>

        <div th:if="${param.error}" style="color: red; margin-bottom: 10px;">
            Usuario o contraseña inválidos.
        </div>

        <div th:if="${param.logout}" style="color: green; margin-bottom: 10px;">
            Has cerrado sesión correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div>
                <label> Usuario: <input type="text" name="username" required/> </label>
            </div>
            <div>
                <label> Contraseña: <input type="password" name="password" required/> </label>
            </div>
            <div style="margin-top: 10px;">
                <input type="submit" value="Ingresar"/>
            </div>
        </form>
        
        <p style="margin-top: 20px;">
            <a th:href="@{/home}">Volver al inicio</a>
        </p>
    </div>
</body>
</html>
